name: Cleanup Cloudflare Preview Deployments

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  cleanup:
    if: true
    runs-on: ubuntu-latest
    steps:
      - name: List preview deployments for merged branch (dry run)
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: website
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          PAGE=1
          FOUND=0

          while true; do
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$PROJECT_NAME/deployments?page=$PAGE&per_page=25")

            if ! echo "$RESPONSE" | jq -e '.result' > /dev/null 2>&1; then
              echo "API error: $RESPONSE"
              exit 1
            fi

            IDS=$(echo "$RESPONSE" | jq -r \
              --arg branch "$BRANCH" \
              '.result[] | select(.environment == "preview") | select(.deployment_trigger.metadata.branch == $branch) | .id')

            for id in $IDS; do
              URL=$(echo "$RESPONSE" | jq -r --arg id "$id" '.result[] | select(.id == $id) | .url')
              echo "[DRY RUN] Would delete: $URL (id: $id, branch: $BRANCH)"
              FOUND=$((FOUND + 1))
            done

            TOTAL=$(echo "$RESPONSE" | jq '.result | length')
            if [ "$TOTAL" -lt 25 ]; then
              break
            fi
            PAGE=$((PAGE + 1))
          done

          echo "Done. Would have deleted $FOUND preview deployment(s) for branch '$BRANCH'."
