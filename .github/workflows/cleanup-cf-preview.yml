name: Cleanup Cloudflare Preview Deployments

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  cleanup:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview deployments for merged branch
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: website
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          PAGE=1
          DELETED=0

          while true; do
            RESPONSE=$(curl -s \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$PROJECT_NAME/deployments?page=$PAGE&per_page=25")

            IDS=$(echo "$RESPONSE" | jq -r \
              --arg branch "$BRANCH" \
              '.result[] | select(.environment == "preview") | select(.deployment_trigger.metadata.branch == $branch) | .id')

            for id in $IDS; do
              echo "Deleting deployment $id (branch: $BRANCH)"
              curl -s -X DELETE \
                -H "Authorization: Bearer $CF_API_TOKEN" \
                "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$PROJECT_NAME/deployments/$id?force=true" \
                | jq -r 'if .success then "Deleted." else "Failed: \(.errors)" end'
              DELETED=$((DELETED + 1))
            done

            TOTAL=$(echo "$RESPONSE" | jq '.result | length')
            if [ "$TOTAL" -lt 25 ]; then
              break
            fi
            PAGE=$((PAGE + 1))
          done

          echo "Done. Deleted $DELETED preview deployment(s) for branch '$BRANCH'."
