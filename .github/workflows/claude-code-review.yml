name: Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/pages/api/**"
      - "src/middleware/**"
      - "src/store/**"
      - "src/utils/**"
      - "public/_headers"
      - "wrangler.toml"
      - "*.config.*"

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: anthropics/claude-code-security-review@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
